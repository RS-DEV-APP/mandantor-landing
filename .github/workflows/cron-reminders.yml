name: Cron — Reminder-Mails

# Sendet täglich Reminder-Mails an Mandanten, deren Akte seit ein paar Tagen
# offen ist. Endpoint: POST /api/cron/reminders mit X-Cron-Auth-Header.
#
# Setup:
#   1. Repository → Settings → Secrets → Actions → New repository secret
#      Name:  MANDANTOR_CRON_SECRET
#      Value: gleicher Wert wie SECRET_KEY in Cloudflare Pages
#   2. (Optional) Repository → Settings → Variables → Actions
#      Name:  MANDANTOR_BASE_URL  (default: https://mandantor.de)

on:
  schedule:
    # 09:00 UTC = 10:00 MEZ / 11:00 MESZ — Mandanten erhalten Mail vormittags
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/cron/reminders
        env:
          BASE_URL: ${{ vars.MANDANTOR_BASE_URL || 'https://mandantor.de' }}
          CRON_SECRET: ${{ secrets.MANDANTOR_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::MANDANTOR_CRON_SECRET not set"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "X-Cron-Auth: $CRON_SECRET" \
            -H "User-Agent: GitHub-Actions-Cron" \
            "$BASE_URL/api/cron/reminders")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron call failed with status $status"
            exit 1
          fi
